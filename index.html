<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResolveAi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a1f] text-white font-sans overflow-x-hidden">
    <header id="header" class="hidden ..."> <!-- mesmo header da versão anterior --> </header>

    <main class="min-h-screen pb-12">
        <!-- TELA INICIAL -->
        <section id="screen-initial" class="screen min-h-screen flex items-center justify-center px-4">
            <div class="max-w-md w-full text-center space-y-8">
                <div class="flex justify-center">
                    <div class="w-24 h-24 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-3xl flex items-center justify-center text-7xl shadow-2xl">R</div>
                </div>
                <h1 class="text-5xl font-bold tracking-tight">ResolveAi</h1>
                <p class="text-gray-400 text-lg">Matemática inteligente e adaptativa</p>
                
                <div class="space-y-4 mt-12">
                    <button onclick="showRegisterScreen()" class="w-full py-6 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl font-bold text-xl hover:brightness-110 transition-all active:scale-95">
                        Criar Nova Conta (Aluno)
                    </button>
                    <button onclick="showLoginScreen()" class="w-full py-6 bg-white/10 hover:bg-white/20 border border-white/20 rounded-3xl font-bold text-xl transition-all active:scale-95">
                        Já tenho conta • Entrar
                    </button>
                    <button onclick="showAdminLoginModal()" class="w-full py-6 text-indigo-400 hover:text-white text-sm flex items-center justify-center gap-2">
                        👨‍🏫 Acesso Administrativo
                    </button>
                </div>
            </div>
        </section>

        <!-- TELA CADASTRO -->
        <section id="screen-register" class="screen hidden min-h-screen flex items-center justify-center px-4">
            <div class="max-w-md w-full bg-[#12122b] border border-white/10 rounded-3xl p-10">
                <h2 class="text-3xl font-bold mb-8 text-center">Criar Conta de Aluno</h2>
                <form onsubmit="handleRegister(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm mb-2 font-medium text-gray-300">Nome / Apelido</label>
                        <input id="reg-username" type="text" required class="w-full bg-[#1c1c33] border border-white/10 focus:border-indigo-500 rounded-3xl px-6 py-5 outline-none text-lg">
                    </div>
                    <div>
                        <label class="block text-sm mb-2 font-medium text-gray-300">Senha</label>
                        <input id="reg-password" type="password" required class="w-full bg-[#1c1c33] border border-white/10 focus:border-indigo-500 rounded-3xl px-6 py-5 outline-none text-lg">
                    </div>
                    <div>
                        <label class="block text-sm mb-2 font-medium text-gray-300">Série</label>
                        <select id="reg-series" class="w-full bg-[#1c1c33] border border-white/10 focus:border-indigo-500 rounded-3xl px-6 py-5 outline-none text-lg">
                            <option value="6º ano">6º ano</option>
                            <option value="9º ano">9º ano</option>
                            <option value="1º médio">1º médio</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full py-5 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl font-bold text-xl hover:brightness-110 transition-all active:scale-95">
                        Criar Conta
                    </button>
                </form>
                <p onclick="showInitialScreen()" class="text-center text-sm text-gray-400 mt-6 cursor-pointer hover:text-white">← Voltar</p>
            </div>
        </section>

        <!-- TELA LOGIN -->
        <section id="screen-login" class="screen hidden min-h-screen flex items-center justify-center px-4">
            <div class="max-w-md w-full bg-[#12122b] border border-white/10 rounded-3xl p-10">
                <h2 class="text-3xl font-bold mb-8 text-center">Entrar na sua conta</h2>
                <form onsubmit="handleLogin(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm mb-2 font-medium text-gray-300">Nome / Apelido</label>
                        <input id="login-username" type="text" required class="w-full bg-[#1c1c33] border border-white/10 focus:border-indigo-500 rounded-3xl px-6 py-5 outline-none text-lg">
                    </div>
                    <div>
                        <label class="block text-sm mb-2 font-medium text-gray-300">Senha</label>
                        <input id="login-password" type="password" required class="w-full bg-[#1c1c33] border border-white/10 focus:border-indigo-500 rounded-3xl px-6 py-5 outline-none text-lg">
                    </div>
                    <button type="submit" class="w-full py-5 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl font-bold text-xl hover:brightness-110 transition-all active:scale-95">
                        Entrar
                    </button>
                </form>
                <p onclick="showInitialScreen()" class="text-center text-sm text-gray-400 mt-6 cursor-pointer hover:text-white">← Voltar</p>
            </div>
        </section>

        <!-- Telas restantes (dashboard, diagnostic, practice, review, ranking, admin) -->
        <!-- Copie as seções correspondentes das versões anteriores aqui (mantidas idênticas) -->
        <!-- screen-diagnostic, screen-dashboard, screen-practice, screen-review, screen-ranking, screen-admin -->

    </main>

    <!-- Modais Admin -->
    <div id="modal-admin" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center z-50">...</div>
    <div id="modal-admin-options" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center z-50">...</div>

    <script src="script.js"></script>
</body>
</html>
